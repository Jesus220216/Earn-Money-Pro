<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soporte y Contacto - EarnPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --card-bg: #121212;
      --primary-green: #22c55e;
      --text-main: #ffffff;
      --text-muted: #9ca3af;
      --border-color: #262626;
      --input-bg: #1a1a1a;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: var(--primary-green); text-align: center; margin-bottom: 30px; }
    .container {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .support-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    .support-card {
      background: var(--input-bg);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid var(--border-color);
    }
    .support-card i { font-size: 30px; color: var(--primary-green); margin-bottom: 10px; }
    .support-card h3 { margin-bottom: 5px; }
    .support-card p { font-size: 14px; color: var(--text-muted); }
    
    form { display: flex; flex-direction: column; gap: 15px; }
    label { font-size: 14px; font-weight: 600; }
    input, textarea {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      color: white;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--primary-green); }
    button {
      background: var(--primary-green);
      color: black;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #16a34a; transform: translateY(-2px); }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--primary-green);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Volver</a>
  <h1>Centro de Soporte</h1>
  
  <div class="support-grid">
    <div class="support-card">
      <i class="fas fa-envelope"></i>
      <h3>Email</h3>
      <p>soporte@earnpro.com</p>
    </div>
    <div class="support-card">
      <i class="fas fa-clock"></i>
      <h3>Horario</h3>
      <p>Lunes a Viernes<br>9:00 AM - 6:00 PM</p>
    </div>
  </div>

  <div class="container">
    <h2>Envíanos un mensaje</h2>
    <p>¿Tienes problemas con un pago o una tarea? Completa el formulario y te responderemos lo antes posible.</p>
    <form id="supportForm">
      <label>Nombre completo</label>
      <input type="text" placeholder="Tu nombre" required>
      
      <label>Correo electrónico</label>
      <input type="email" placeholder="tu@email.com" required>
      
      <label>Asunto</label>
      <input type="text" placeholder="Ej: Problema con retiro" required>
      
      <label>Mensaje</label>
      <textarea rows="5" placeholder="Describe tu problema en detalle..." required></textarea>
      
      <button type="submit">Enviar Mensaje</button>
    </form>
  </div>

  <script>
    document.getElementById('supportForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('¡Mensaje enviado con éxito! Nos pondremos en contacto contigo pronto.');
      this.reset();
    });
  </script>
</body>
</html>
