<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EarnPro Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<!-- CPA LOCKER -->
<script src="https://playabledownloads.com/script_include.php?id=1889035"></script>

</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>💰 EarnPro</h2>

    <a class="active">🏠</a>
    <a>💰</a>
    <a>👥</a>
    <a>💳</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="topbar">
      <h3>Dashboard</h3>
      <div class="balance">$0.00</div>
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <span>Balance</span>
        <h2>$0.00</h2>
      </div>

      <div class="card">
        <span>Offers</span>
        <h2>0</h2>
      </div>

      <div class="card">
        <span>Referrals</span>
        <h2>0</h2>
      </div>
    </div>

    <!-- EARN BOX -->
    <div class="earn">
      <h2>💰 Earn Now</h2>
      <p>Complete 1 step to unlock rewards</p>
      <button onclick="openLocker()">Start</button>
    </div>

    <!-- OFFERS -->
    <div class="offers">
      <div class="offer" onclick="openLocker()">📱 App - $2</div>
      <div class="offer" onclick="openLocker()">📋 Survey - $1</div>
      <div class="offer" onclick="openLocker()">🎮 Game - $5</div>
    </div>

  </main>

</div>

<!-- MONETAG -->
<script src="//omg10.com/4/10828691"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
