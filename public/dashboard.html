<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPro Dashboard - Gana Dinero Fácil</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">

<!-- HEADER -->
<div class="header-hero">
  <div class="header-background">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663427137618/DZNVjeDi2TTeJHBF4drPLX/hero-dashboard-eXtDujZMPEtYity8XHWzjU.webp">
  </div>

  <div class="header-content">
    <div>
      <h1>EarnPro Dashboard</h1>
      <p>Bienvenido de vuelta, usuario. Sigue ganando dinero fácil.</p>
    </div>
    <div>
      ⚡ <span id="today">+$0.00 hoy</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-container">

<!-- STATS -->
<div class="stats-grid">

<div class="stat-card">
<h3>Saldo</h3>
<p id="balance">$0.00</p>
</div>

<div class="stat-card">
<h3>Referidos</h3>
<p id="refCount">0</p>
</div>

<div class="stat-card">
<h3>Hoy</h3>
<p id="todayEarnings">$0.00</p>
</div>

<div class="stat-card">
<h3>Videos</h3>
<p id="videos">0</p>
</div>

</div>

<!-- 💰 CPA SECTION (ARREGLADO PRO) -->
<div class="cpa-section">

<h2>🚀 Gana hasta $${reward} ahora</h2>

<div class="cpa-buttons">
<button onclick="loadOffers()">🔥 Offerwall (PRO)</button>
<button onclick="openLocker()">🎁 Desbloquear recompensa</button>
</div>

<!-- OFERTAS DINÁMICAS -->
<div id="offers" style="margin-top:20px;"></div>

<!-- OPCIONAL iframe -->
<div style="margin-top:20px;">
<iframe id="offerwallFrame" style="width:100%; height:500px; border:none; border-radius:10px;"></iframe>
</div>

</div>

<!-- RETIRO -->
<div class="activity-section">

<h2>Solicitar Retiro</h2>

<input type="email" id="email" placeholder="Tu email">
<input type="number" id="amount" placeholder="Monto">

<button onclick="withdraw()">💳 Retirar</button>

</div>

<!-- LOGOUT -->
<div style="text-align:center;margin-top:20px;">
<button onclick="logout()">🚪 Cerrar sesión</button>
</div>

</div>

<!-- SCRIPTS -->
<script type="module" src="/js/dashboard.js"></script>

</body>
</html>
