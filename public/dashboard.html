<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EarnPro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div class="min-h-screen">

<!-- HEADER -->
<div class="header-hero">
  <div class="header-content">
    <div>
      <h1>EarnPro Dashboard</h1>
      <p>Gana dinero con tareas simples</p>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-container">

<!-- STATS -->
<div class="stats-grid">

  <div class="stat-card">
    <h3>💰 Saldo</h3>
    <p id="balance">$0.00</p>
  </div>

  <div class="stat-card">
    <h3>👥 Referidos</h3>
    <p id="refCount">0</p>
  </div>

  <div class="stat-card">
    <h3>📈 Hoy</h3>
    <p id="todayEarnings">$0.00</p>
  </div>

  <div class="stat-card">
    <h3>🎥 Videos</h3>
    <p id="videos">0</p>
  </div>

</div>

<!-- PROGRESS -->
<div class="section-card" style="padding:15px; margin-bottom:20px;">

  <h2>🎯 Progreso Bonus</h2>

  <div style="background:#111827; border-radius:999px; overflow:hidden;">
    <div id="progressBar" style="height:10px;width:0%;background:#10B981;transition:width 0.3s ease;"></div>
  </div>

  <p id="progressText">0/3 ofertas completadas</p>

</div>

<!-- BOTONES CPA -->
<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">

  <button class="btn-pro btn-video" onclick="startVideo()">🎥 Video</button>

  <button class="btn-pro btn-game" onclick="playGame()">🎮 Juego</button>

  <button class="btn-pro btn-spin" onclick="spin()">🎰 Ruleta</button>

  <button class="btn-pro btn-daily" onclick="daily()">🎁 Daily</button>

</div>

<!-- CPA SECTION -->
<div class="section-card" style="padding:15px;">

<h2>🚀 Ofertas</h2>

<div style="margin-bottom:10px;">
  <button class="btn-pro btn-video" onclick="loadOffers()">Cargar ofertas</button>
  <button class="btn-pro btn-spin" onclick="openLocker()">Locker</button>
</div>

<div id="offers" style="min-height: 50px;">
  <p style="color: #94a3b8; font-size: 13px;">Cargando ofertas...</p>
</div>

</div>

<!-- RETIRO -->
<div class="section-card" style="padding:15px; margin-top:20px;">

<h2>💳 Retiro</h2>

<input type="email" id="email" placeholder="Email de PayPal" style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
<input type="number" id="amount" placeholder="Monto (mínimo $5)" style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;" step="0.01" min="5">

<button class="btn-pro btn-game" style="width: 100%;" onclick="withdraw()">Retirar</button>

</div>

<!-- REFERIDOS -->
<div class="section-card" style="padding:15px; margin-top:20px;">

<h2>🔗 Sistema de Referidos</h2>
<p style="font-size: 13px; color: #94a3b8; margin-bottom: 10px;">¡Gana $1.00 por cada amigo que se registre con tu enlace!</p>

<div style="display: flex; gap: 5px;">
  <input type="text" id="refLink" readonly style="flex: 1; margin-top: 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #10B981; font-weight: bold;" value="Cargando enlace...">
  <button class="btn-pro btn-video" onclick="copyRef()" style="white-space: nowrap;">Copiar</button>
</div>

</div>

<!-- LOGOUT -->
<div style="margin-top:20px; text-align:center; margin-bottom:30px;">
<button class="btn-pro btn-spin" onclick="logout()">Cerrar sesión</button>
</div>

</div>

<!-- SCRIPT DE DASHBOARD -->
<script type="module" src="/js/dashboard.js"></script>

</body>
</html>
