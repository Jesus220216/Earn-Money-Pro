<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EarnPro</title>
<link rel="stylesheet" href="/css/dashboard.css">

<style>
#wheel {
  font-size: 50px;
  transition: transform 3s ease-out;
}
</style>

</head>

<body class="dashboard">

<div class="nav">
  <div class="logo">💰 EarnPro</div>
  <div class="nav-right">
    <div class="balance-mini">$0.00</div>
    <button onclick="logout()">Salir</button>
  </div>
</div>

<div class="container">

<div class="left">

<h2>🔥 Gana dinero</h2>

<div class="grid">

<!-- 🎥 VIDEO -->
<div class="card hover">
  <h3>🎥 Videos Pro</h3>

  <video id="videoPlayer" width="100%" height="150" controls muted></video>

  <p id="timerText">0/10</p>
  <p id="videosLeft">Restantes: 6</p>

  <button onclick="startVideo()">Iniciar</button>
</div>

<!-- 🎰 RULETA -->
<div class="card">
  <h3>🎰 Ruleta</h3>

  <div class="wheel-container">
    <div id="wheel">🎡</div>
  </div>

  <p id="spinCount">0 / 10 giros</p>

  <button onclick="spin()">Girar</button>
</div>

<!-- 🎁 DAILY -->
<div class="card">
  <h3>🎁 Recompensa diaria</h3>
  <button onclick="daily()">Reclamar</button>
</div>

<!-- 📋 ENCUESTA -->
<div class="card">
  <h3>📋 Encuestas</h3>
  <button onclick="survey()">Abrir</button>
</div>

<!-- 🎁 OFERTAS -->
<div class="card">
  <h3>🎁 Ofertas PRO</h3>
  <button onclick="lootably()">Abrir</button>
</div>

<!-- 🎮 JUEGO -->
<div class="card">
  <h3>🎮 Juegos</h3>
  <button onclick="game()">Jugar</button>
</div>

</div>
</div>

<div class="right">

<div class="card">
  <h3>💰 Balance</h3>
  <h1 id="balance">$0.00</h1>
</div>

<div class="card">
  <h3>💸 Retirar</h3>
  <input id="email" placeholder="PayPal">
  <input id="amount" placeholder="Monto">
  <button onclick="withdraw()">Retirar</button>
</div>

<h3>📜 Historial de retiros</h3>
<div id="withdrawList"></div>

<div class="card">
  <h3>📊 Referidos</h3>
  <p>Invitados: <span id="refCount">0</span></p>
  <p>Ganado: $<span id="refEarn">0.00</span></p>
</div>

<div class="card">
  <h3>🔗 Tu link de referido</h3>
  <input id="refLink" readonly style="width:100%;padding:8px;">
  <button onclick="copyRef()">Copiar</button>
</div>

</div>

</div>

<script type="module" src="/js/dashboard.js"></script>
  <!-- 🔥 MONETAG ANUNCIOS -->
<script src="//omg10.com/4/10828691"></script>

  <script src="https://quge5.com/88/tag.min.js" data-zone="226840" async data-cfasync="false"></script>
  
<script>
(function(s){
  s.dataset.zone='10837191',
  s.src='https://al5sm.com/tag.min.js'
})([document.documentElement, document.body]
  .filter(Boolean)
  .pop()
  .appendChild(document.createElement('script')))
</script> 
  
</body>
</html>
