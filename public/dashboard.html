<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>EarnPro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <h1>💰 EarnPro</h1>
</header>

<div class="container">

  <!-- 🔥 RESUMEN -->
  <div class="grid">

    <div class="card">
      <h3>💰 Balance</h3>
      <p id="balance">$0.00</p>
    </div>

    <div class="card">
      <h3>👥 Referidos</h3>
      <p id="refCount">0</p>
    </div>

    <div class="card">
      <h3>📅 Hoy</h3>
      <p id="today">$0.00</p>
    </div>

    <div class="card">
      <h3>🎥 Videos</h3>
      <p id="videos">0</p>
    </div>

  </div>

  <!-- 🎥 VIDEO -->
  <div class="section">
    <h2>🎥 Ver videos</h2>

    <div class="video-box">
      <video id="videoPlayer" controls muted></video>
      <p id="videosLeft">Restantes: 6</p>
      <button class="btn" onclick="startVideo()">Ver video</button>
    </div>
  </div>

  <!-- 🎰 RULETA -->
  <div class="section">
    <h2>🎰 Ruleta</h2>

    <div class="card center">
      <p id="spinCount">0 / 10</p>
      <button class="btn" onclick="spin()">Girar</button>
    </div>
  </div>

  <!-- 🎮 JUEGOS -->
  <div class="section">
    <h2>🎮 Juegos</h2>

    <button class="btn" onclick="playGame()">Jugar</button>
  </div>

  <!-- 🎁 DAILY -->
  <div class="section">
    <h2>🎁 Daily</h2>

    <button class="btn" onclick="daily()">Reclamar</button>
  </div>

  <!-- 💸 RETIRO -->
  <div class="section">
    <h2>💸 Retirar</h2>

    <input id="email" placeholder="PayPal">
    <input id="amount" placeholder="Monto">
    <button class="btn" onclick="withdraw()">Retirar</button>
  </div>

  <!-- 👥 REFERIDOS -->
  <div class="section">
    <h2>👥 Referidos</h2>

    <p>Invitados: <span id="refCountRef">0</span></p>
    <p>Ganado: $<span id="refEarn">0.00</span></p>

    <input id="refLink" readonly>
    <button class="btn" onclick="copyRef()">Copiar link</button>
  </div>

  <!-- 📜 HISTORIAL -->
  <div class="section">
    <h2>📜 Historial</h2>
    <div id="withdrawList"></div>
  </div>

  <!-- 🚪 LOGOUT -->
  <button class="btn" onclick="logout()">Cerrar sesión</button>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
