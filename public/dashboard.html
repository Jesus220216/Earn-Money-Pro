<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPro Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div class="min-h-screen">

<!-- HEADER -->
<div class="header-hero">

  <div class="header-background">
    <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663427137618/DZNVjeDi2TTeJHBF4drPLX/hero-dashboard-eXtDujZMPEtYity8XHWzjU.webp">
  </div>

  <div class="header-content">
    <div>
      <h1>EarnPro Dashboard</h1>
      <p>Gana dinero completando ofertas CPA</p>
    </div>

    <div>
      ⚡ <span id="today">$0.00 hoy</span>
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="main-container">

<!-- STATS -->
<div class="stats-grid">

  <div class="stat-card">
    <div class="card-content">
      <h3>💰 Saldo</h3>
      <p id="balance">$0.00</p>
    </div>
  </div>

  <div class="stat-card">
    <div class="card-content">
      <h3>👥 Referidos</h3>
      <p id="refCount">0</p>
    </div>
  </div>

  <div class="stat-card">
    <div class="card-content">
      <h3>📈 Hoy</h3>
      <p id="todayEarnings">$0.00</p>
    </div>
  </div>

  <div class="stat-card">
    <div class="card-content">
      <h3>🎥 Videos</h3>
      <p id="videos">0</p>
    </div>
  </div>

</div>

<!-- PROGRESS -->
<div class="section-card">
  <div class="section-content">

    <h2>🎯 Progreso de Bonus</h2>

    <div style="margin-top:10px;">
      <div style="width:100%; background:#1e293b; border-radius:10px; overflow:hidden;">
        <div id="progressBar" style="
          width:0%;
          height:10px;
          background:linear-gradient(90deg,#10B981,#3B82F6);
          transition:0.3s;
        "></div>
      </div>

      <p id="progressText" style="margin-top:8px;font-size:12px;">
        0/3 ofertas completadas
      </p>

    </div>

  </div>
</div>

<!-- CPA ACTIONS -->
<div class="section-card">
  <div class="section-content">

    <h2>🚀 Gana dinero</h2>

    <div class="games-grid">

      <div class="game-item" onclick="startVideo()">
        <div class="game-icon">🎥</div>
        <div class="game-name">Video</div>
        <div class="game-reward">+CPA</div>
      </div>

      <div class="game-item" onclick="playGame()">
        <div class="game-icon">🎮</div>
        <div class="game-name">Juego</div>
        <div class="game-reward">+CPA</div>
      </div>

      <div class="game-item" onclick="spin()">
        <div class="game-icon">🎰</div>
        <div class="game-name">Ruleta</div>
        <div class="game-reward">+CPA</div>
      </div>

      <div class="game-item" onclick="daily()">
        <div class="game-icon">🎁</div>
        <div class="game-name">Daily</div>
        <div class="game-reward">+CPA</div>
      </div>

    </div>

  </div>
</div>

<!-- REFERIDOS -->
<div class="section-card">
  <div class="section-content">

    <h2>👥 Referidos</h2>

    <input id="refLink" type="text" placeholder="Tu link de referido" />

    <button class="btn btn-emerald" onclick="generateRefLink()">
      🔗 Generar link
    </button>

    <button class="btn btn-blue" onclick="copyRef()">
      📋 Copiar link
    </button>

  </div>
</div>

<!-- OFERTAS -->
<div class="section-card">
  <div class="section-content">

    <h2>🔥 Offerwall</h2>

    <button class="btn btn-amber" onclick="loadOffers()">
      Cargar ofertas CPA
    </button>

    <div id="offers" style="margin-top:15px;"></div>

  </div>
</div>

<!-- RETIRO -->
<div class="section-card">
  <div class="section-content">

    <h2>💸 Retiro</h2>

    <input type="email" id="email" placeholder="Tu email" />
    <input type="number" id="amount" placeholder="Monto mínimo $5" />

    <button class="btn btn-emerald" onclick="withdraw()">
      Solicitar retiro
    </button>

  </div>
</div>

<!-- LOGOUT -->
<div style="text-align:center;margin-top:20px;">
  <button class="btn btn-amber" onclick="logout()">
    🚪 Cerrar sesión
  </button>
</div>

</div>

<!-- SCRIPT -->
<script type="module" src="/js/dashboard.js"></script>

</body>
</html>
