<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EarnPro Dashboard - Gana Dinero Fácil</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">

    <!-- HEADER ORIGINAL -->
    <div class="header-hero">
        <div class="header-background">
            <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663427137618/DZNVjeDi2TTeJHBF4drPLX/hero-dashboard-eXtDujZMPEtYity8XHWzjU.webp">
        </div>

        <div class="header-content">
            <div class="header-text">
                <h1>EarnPro Dashboard</h1>
                <p>Bienvenido de vuelta, usuario. Sigue ganando dinero fácil.</p>
            </div>

            <div class="header-badge">
                <span>⚡</span>
                <span id="today">+$0.00 hoy</span>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-container">

        <!-- STATS GRID ORIGINAL -->
        <div class="stats-grid">

            <div class="stat-card glass">
                <h3>Saldo Actual</h3>
                <p id="balance">$0.00</p>
            </div>

            <div class="stat-card glass">
                <h3>Referidos</h3>
                <p id="refCount">0</p>
            </div>

            <div class="stat-card glass">
                <h3>Ganancias Hoy</h3>
                <p id="todayEarnings">$0.00</p>
            </div>

            <div class="stat-card glass">
                <h3>Videos</h3>
                <p id="videos">0</p>
                <small id="videosLeft">Restantes: 6</small>
            </div>

        </div>

        <!-- JUEGOS ORIGINAL -->
        <div class="section-card">

            <h2>Juega y Gana</h2>

            <div class="games-grid">
                <div onclick="playGame()">🎮 Juego</div>
                <div onclick="spin()">🎰 Ruleta</div>
                <div onclick="daily()">🎁 Daily</div>
            </div>

            <button onclick="playGame()">Jugar Ahora</button>

        </div>

        <!-- CPA ORIGINAL -->
        <div class="cpa-section">

            <h2>💰 Ganar Dinero Real</h2>

            <button onclick="openOfferwall()">Offerwall</button>
            <button onclick="openLocker()">Locker</button>

            <iframe id="offerwallFrame"></iframe>

        </div>

        <!-- ENCUESTAS -->
        <div class="section-card">
            <h2>Encuestas</h2>
            <button onclick="openBox()">Ver Encuestas</button>
        </div>

        <!-- VIDEOS -->
        <div class="section-card">
            <h2>Ver Videos</h2>

            <button onclick="startVideo()">Ver Video</button>
        </div>

        <!-- OFERTAS -->
        <div class="section-card">
            <h2>Ofertas</h2>

            <button onclick="openBox()">Ver Ofertas</button>
        </div>

        <!-- REFERIDOS -->
        <div>
            <input id="refLink" readonly>
            <button onclick="copyRef()">Copiar Link</button>
        </div>

        <!-- RETIRO -->
        <div>
            <input id="email" placeholder="Email">
            <input id="amount" placeholder="Monto mínimo 5$">
            <button onclick="withdraw()">Retirar</button>
        </div>

        <!-- LOGOUT -->
        <button onclick="logout()">Cerrar Sesión</button>

    </div>
</div>

<!-- SOLO TU JS REAL -->
<script type="module" src="/js/dashboard.js"></script>

</body>
</html>
