<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EarnPro</title>
<link rel="stylesheet" href="/css/dashboard.css">
</head>

<body class="dashboard">

<div class="nav">
  <div class="logo">💰 EarnPro</div>
  <div class="nav-right">
    <div class="balance-mini">$0.00</div>
    <button onclick="logout()">Salir</button>
  </div>
</div>

<div class="container">

<div class="left">

<h2>🔥 Gana dinero</h2>

<div class="grid">

<!-- 🎥 VIDEO PRO -->
<div class="card hover">
  <h3>🎥 Videos Pro</h3>

  <!-- 🎬 VIDEO PREVIEW -->
 <video id="videoPlayer" width="100%" height="150" controls muted style="border-radius:10px;"></video>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <p id="timerText">0/20</p>
  <p id="videosLeft">Restantes: 6</p>

  <button onclick="startVideo()">Iniciar</button>
</div>

<!-- 🎰 RULETA -->
<div class="card">
  <h3>🎰 Ruleta</h3>

  <div class="wheel-container">
    <div id="wheel">🎡</div>
  </div>

  <p id="spinStatus">Listo para girar</p>

  <!-- 🔥 PROGRESO -->
  <div class="spin-bar">
    <div id="spinFill"></div>
  </div>
  <p id="spinCount">0 / 10 giros</p>

  <button onclick="spin()">Girar</button>
</div>

<!-- 🎁 DAILY -->
<div class="card">
  <h3>🎁 Recompensa diaria</h3>
  <button onclick="daily()">Reclamar</button>
</div>

<!-- 📋 ENCUESTA -->
<div class="card">
  <h3>📋 Encuestas</h3>
  <button onclick="survey()">Abrir</button>
</div>

<!-- 🎁 LOOTABLY -->
<div class="card">
  <h3>🎁 Ofertas PRO</h3>
  <button onclick="lootably()">Abrir</button>
</div>

<!-- 🎮 JUEGO -->
<div class="card">
  <h3>🎮 Juegos</h3>
  <button onclick="game()">Jugar</button>
</div>

</div>
</div>

<div class="right">

<div class="card">
  <h3>💰 Balance</h3>
  <h1 id="balance">$0.00</h1>
</div>

<div class="card">
  <h3>💸 Retirar</h3>
  <input id="email" placeholder="PayPal">
  <input id="amount" placeholder="Monto">
  <button onclick="withdraw()">Retirar</button>
</div>

<div class="card">
  <h3>📊 Referidos</h3>
  <p>Invitados: <span id="refCount">0</span></p>
  <p>Ganado: $<span id="refEarn">0.00</span></p>
</div>

</div>

</div>
<script src="/css/dashboard.css"></script>
  
<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
