<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EarnPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="topbar">
  <div class="logo">💰 EarnPro</div>

  <div class="top-right">
    <div class="balance-mini">$0.00</div>
    <button onclick="logout()">Salir</button>
  </div>
</div>

<div class="layout">

<div class="left">
<h2>🔥 Earn Money</h2>

<div class="grid">

<div class="card">
  <h3>🎥 Watch & Earn</h3>
  <video id="videoPlayer" controls muted></video>
  <p id="videosLeft">Left: 6</p>
  <button onclick="startVideo()">Start</button>
</div>

<div class="card">
  <h3>🎰 Spin</h3>
  <div id="wheel">🎡</div>
  <button onclick="spin()">Spin</button>
</div>

<div class="card">
  <h3>🎁 Daily</h3>
  <button onclick="daily()">Claim</button>
</div>

<div class="card">
  <h3>🔥 Offers</h3>
  <button onclick="openLocker()">Start</button>
</div>

</div>
</div>

<div class="right">

<div class="card">
  <h3>💰 Balance</h3>
  <h1 id="balance">$0.00</h1>
</div>

<div class="card">
  <h3>💸 Withdraw</h3>
  <input id="email" placeholder="PayPal email">
  <input id="amount" placeholder="Amount">
  <button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
  <h3>📊 Referrals</h3>
  <p id="refCount">0</p>
</div>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
