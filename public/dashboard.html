<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
  <div class="logo">💰 EarnPro</div>
  <button onclick="logout()">Salir</button>
</div>

<div class="banner">🔥 Gana dinero 🔥</div>

<div class="main">

<!-- IZQUIERDA -->
<div class="left">

<h3>🎥 Videos</h3>
<div class="btn" onclick="startVideo()">Ver video</div>
<p id="timerText">0/20</p>

<h3>📋 Encuestas</h3>
<div class="btn" onclick="survey()">Ganar $0.10</div>

<h3>🧩 Tareas</h3>
<div class="btn" onclick="task()">Ganar $0.15</div>

<h3>🎮 Juego</h3>
<div class="btn" onclick="game()">Jugar</div>

</div>

<!-- DERECHA -->
<div class="right">

<h3>💰 Balance</h3>
<p id="balance">$0.00</p>

<h3>💸 Retiro</h3>
<input id="email" placeholder="PayPal / Binance">
<input id="amount" placeholder="Monto">
<div class="btn" onclick="withdraw()">Retirar</div>

</div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
