<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EarnPro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">💰 EarnPro</div>

  <div class="nav-right">
    <div class="balance-mini">$0.32</div>
    <button class="logout">Salir</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- LEFT -->
  <div class="left">

    <h2 class="title">🔥 Gana dinero</h2>

    <div class="grid">

      <div class="card hover">
        <h3>🎥 Videos</h3>
        <p>Mira anuncios y gana dinero</p>
        <button>Empezar</button>
      </div>

      <div class="card hover">
        <h3>📋 Encuestas</h3>
        <p>Responde y gana $</p>
        <button>Ganar</button>
      </div>

      <div class="card hover">
        <h3>🧩 Tareas</h3>
        <p>Apps y registros</p>
        <button>Completar</button>
      </div>

      <div class="card hover">
        <h3>🎮 Juegos</h3>
        <p>Juega y gana</p>
        <button>Jugar</button>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="card glass">
      <h3>💰 Balance</h3>
      <h1 id="balance">$0.32</h1>
      <p class="sub">Disponible para retirar</p>
    </div>

    <div class="card glass">
      <h3>💸 Retirar</h3>

      <input placeholder="PayPal o Binance">
      <input placeholder="Monto">

      <button class="withdraw">Retirar dinero</button>
    </div>

    <div class="card glass">
      <h3>👥 Referidos</h3>
      <p>Gana 10% de tus amigos</p>
      <input value="https://tuweb.com?ref=123" readonly>
    </div>

  </div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
