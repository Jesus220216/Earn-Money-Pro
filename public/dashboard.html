<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EarnPro</title>
<link rel="stylesheet" href="/css/dashboard.css">

<style>
iframe {
  width: 100%;
  height: 250px;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body class="dashboard">

<div class="nav">
  <div class="logo">💰 EarnPro</div>
  <div class="nav-right">
    <div class="balance-mini">$0.00</div>
    <button onclick="logout()">Salir</button>
  </div>
</div>

<div class="container">

<div class="left">

<h2>🔥 Gana dinero</h2>

<div class="grid">

<!-- 🎥 VIDEO -->
<div class="card">
  <h3>🎥 Videos</h3>
  <video id="videoPlayer" width="100%" height="150" controls muted></video>
  <p id="timerText">0/10</p>
  <p id="videosLeft">Restantes: 6</p>
  <button onclick="startVideo()">Ver y ganar</button>
</div>

<!-- 🎰 RULETA -->
<div class="card">
  <h3>🎰 Ruleta</h3>
  <div id="wheel">🎡</div>
  <p id="spinCount">0 / 10 giros</p>
  <button onclick="spin()">Girar</button>
</div>

<!-- 🎁 DAILY -->
<div class="card">
  <h3>🎁 Recompensa diaria</h3>
  <button onclick="daily()">Reclamar</button>
</div>

<!-- 💸 OFERTAS -->
<div class="card">
  <h3>💸 Ofertas</h3>
  <button onclick="offer()">Completar oferta</button>
</div>

<!-- 🎮 JUEGOS REALES -->
<div class="card">
  <h3>🎮 Juegos reales</h3>

  <iframe src="https://html5.gamedistribution.com/rvvASMiM/6d5e0f9d4f9c4f3a9c9b9a0e3f/index.html"></iframe>

  <button onclick="rewardGame()">💰 Reclamar</button>
</div>

<!-- 🎮 MÁS JUEGOS -->
<div class="card">
  <h3>🎮 Más juegos</h3>

  <iframe src="https://www.crazygames.com/embed"></iframe>

  <button onclick="game()">💰 Jugar y ganar</button>
</div>

  <div class="card">
  <h3>🎮 Juegos reales</h3>
  <button onclick="openGame()">Jugar ahora</button>
</div>

</div>
</div>

<!-- 💰 PANEL DERECHO -->
<div class="right">

<div class="card">
  <h3>💰 Balance</h3>
  <h1 id="balance">$0.00</h1>
</div>

<div class="card">
  <h3>💸 Retirar</h3>
  <input id="email" placeholder="PayPal">
  <input id="amount" placeholder="Monto">
  <button onclick="withdraw()">Retirar</button>
</div>

<h3>📜 Historial</h3>
<div id="withdrawList"></div>

<div class="card">
  <h3>📊 Referidos</h3>
  <p>Invitados: <span id="refCount">0</span></p>
  <p>Ganado: $<span id="refEarn">0.00</span></p>
</div>

<div class="card">
  <h3>🔗 Tu link</h3>
  <input id="refLink" readonly>
  <button onclick="copyRef()">Copiar</button>
</div>

</div>

</div>

<script type="module" src="/js/dashboard.js"></script>

</body>
</html>
