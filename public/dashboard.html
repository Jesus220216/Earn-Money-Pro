<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EarnPro - Panel PRO</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">

  <style>
    body { font-family: Poppins; }
    .section-hidden { display:none }
    .section-active { display:block }

    .admin-box{
      background:#111;
      border:1px solid #22c55e;
      padding:15px;
      border-radius:10px;
      margin-top:20px;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>💰 EarnPro</h2>

  <a href="#" class="nav-item active" data-section="dashboard">📊 Dashboard</a>
  <a href="#" class="nav-item" data-section="earnings">💰 Ganar</a>
  <a href="#" class="nav-item" data-section="referrals">🔗 Referidos</a>
  <a href="#" class="nav-item" data-section="withdraw">💳 Retiro</a>
  <a href="#" class="nav-item" data-section="admin">🛠 Admin</a>

  <button onclick="logout()">🚪 Salir</button>
</div>

<!-- MAIN -->
<div class="main-content">

<!-- DASHBOARD -->
<section id="dashboard-section" class="section-active">

<h2>Panel</h2>

<p>Saldo: <span id="balance">$0.00</span></p>
<p>Hoy: <span id="todayEarnings">$0.00</span></p>
<p>Videos: <span id="videosLeft">6</span></p>

<div>
<button onclick="startVideo()">🎥 Video</button>
<button onclick="playGame()">🎮 Juego</button>
<button onclick="spin()">🎰 Spin</button>
<button onclick="daily()">🎁 Diario</button>
</div>

</section>

<!-- GANANCIAS -->
<section id="earnings-section" class="section-hidden">

<h2>Ganar Dinero</h2>

<button onclick="startVideo()">🎥 Ver Video</button>
<button onclick="playGame()">🎮 Jugar</button>

<!-- 🔥 BOTONES CPA EXTRA -->
<button onclick="openOfferwall()">⭐ Ofertas PRO</button>
<button onclick="triggerCPA()">💰 Oferta Rápida</button>

<!-- 🔥 VIRAL -->
<button onclick="shareWhatsApp()">📲 Compartir WhatsApp</button>

</section>

<!-- REFERIDOS -->
<section id="referrals-section" class="section-hidden">

<h2>Referidos</h2>

<input id="refLink" readonly style="width:100%">
<button onclick="copyRef()">Copiar</button>

</section>

<!-- RETIRO -->
<section id="withdraw-section" class="section-hidden">

<h2>Retiro</h2>

<input id="email" placeholder="PayPal">
<input id="amount" placeholder="Monto">

<button onclick="withdraw()">Retirar</button>

</section>

<!-- 🔥 ADMIN PANEL -->
<section id="admin-section" class="section-hidden">

<h2>🛠 Panel Admin</h2>

<div class="admin-box">
<p>Usuarios: <span id="adminUsers">0</span></p>
<p>Clicks: <span id="adminClicks">0</span></p>
</div>

</section>

</div>

<!-- JS -->
<script type="module" src="/js/dashboard.js"></script>

<!-- NAV -->
<script>
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.onclick = e=>{
    e.preventDefault()

    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
    btn.classList.add('active')

    document.querySelectorAll('section').forEach(s=>{
      s.classList.remove('section-active')
      s.classList.add('section-hidden')
    })

    document.getElementById(btn.dataset.section + "-section").classList.add('section-active')
  }
})
</script>

<!-- 🔥 MONETAG -->
<script>
(function(s){
  s.dataset.zone='10877528';
  s.src='https://al5sm.com/tag.min.js';
})(document.body.appendChild(document.createElement('script')));
</script>

</body>
</html>
