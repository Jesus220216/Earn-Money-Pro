<script>
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");

if (ref) {
  sessionStorage.setItem("referrer", ref);
}

// 🔐 CAPTCHA
async function getCaptchaToken(action) {
  return await grecaptcha.enterprise.execute('6LcbvagsAAAAAAUgJBdifHX8w1Rdpu5HZiJqB17M', { action });
}

async function loginCaptcha() {
  const token = await getCaptchaToken('login');
  login(token);
}

async function registerCaptcha() {
  const token = await getCaptchaToken('register');
  register(token);
}
</script>
